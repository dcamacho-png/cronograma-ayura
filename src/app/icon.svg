<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cronograma Ayurá">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15734a"/>
      <stop offset="1" stop-color="#0e5233"/>
    </linearGradient>
  </defs>

  <!-- fondo redondeado -->
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#bg)"/>

  <!-- anillas del calendario -->
  <rect x="176" y="96" width="26" height="60" rx="13" fill="#0b452b"/>
  <rect x="310" y="96" width="26" height="60" rx="13" fill="#0b452b"/>

  <!-- cuerpo del calendario (crema) -->
  <rect x="104" y="120" width="304" height="288" rx="34" fill="#f6f2e9"/>
  <!-- cabecera arcilla, solo esquinas superiores redondeadas -->
  <path d="M104 154 a34 34 0 0 1 34 -34 h236 a34 34 0 0 1 34 34 v40 h-304 z" fill="#b06a28"/>

  <!-- vaquita centrada en el cuerpo del calendario -->
  <g>
    <!-- orejas -->
    <ellipse cx="150" cy="264" rx="34" ry="24" transform="rotate(-24 150 264)" fill="#fffdf8" stroke="#e6dcc6" stroke-width="4"/>
    <ellipse cx="362" cy="264" rx="34" ry="24" transform="rotate(24 362 264)" fill="#fffdf8" stroke="#e6dcc6" stroke-width="4"/>
    <!-- cuernitos -->
    <ellipse cx="214" cy="228" rx="15" ry="19" transform="rotate(-18 214 228)" fill="#cbb892"/>
    <ellipse cx="298" cy="228" rx="15" ry="19" transform="rotate(18 298 228)" fill="#cbb892"/>

    <!-- cabeza -->
    <ellipse cx="256" cy="300" rx="98" ry="86" fill="#fffdf8" stroke="#e6dcc6" stroke-width="4"/>
    <!-- manchas -->
    <path d="M204 248 q28 -20 50 4 q-8 34 -44 30 q-26 -18 -6 -34 z" fill="#1f3d2b"/>
    <circle cx="318" cy="264" r="17" fill="#1f3d2b"/>

    <!-- ojos -->
    <circle cx="222" cy="296" r="11" fill="#1f3d2b"/>
    <circle cx="290" cy="296" r="11" fill="#1f3d2b"/>

    <!-- hocico -->
    <ellipse cx="256" cy="348" rx="58" ry="40" fill="#efe7d6" stroke="#e0d3b8" stroke-width="3"/>
    <ellipse cx="236" cy="350" rx="8" ry="11" fill="#8a6b4a"/>
    <ellipse cx="278" cy="350" rx="8" ry="11" fill="#8a6b4a"/>
  </g>
</svg>
